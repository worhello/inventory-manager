<div class="page-body">

  <h2>Shopping List</h2>
  
  <button matButton="filled" (click)="addNewItem()">Add new item</button>

  <table mat-table [dataSource]="getShoppingBasket()" class="mat-elevation-z8" cdkDropList (cdkDropListDropped)="drop($event)">

    <ng-container matColumnDef="checked" sticky>
      <mat-header-cell *matHeaderCellDef>Checked</mat-header-cell>
      <mat-cell *matCellDef="let element">
        <mat-icon class="example-drag-cursor">reorder</mat-icon>
        <mat-checkbox [checked]="element.checked" (change)="onItemChecked(element)"></mat-checkbox>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="category">
      <mat-header-cell *matHeaderCellDef>Category</mat-header-cell>
      <mat-cell *matCellDef="let element"> {{element.category}} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef> Name </mat-header-cell>
      <mat-cell *matCellDef="let element"> {{element.name}} </mat-cell>
    </ng-container>

    <ng-container matColumnDef="quantityToBuy">
      <mat-header-cell *matHeaderCellDef>Quantity To Buy</mat-header-cell>
      <mat-cell *matCellDef="let element">
        <mat-form-field>
          <mat-label>Quantity To Buy</mat-label>
          <input matInput type="number" min="1" [value]="element.quantityToBuy" (change)="onQuantityToBuyChanged($event.target.value, element)">
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;" cdkDrag [cdkDragData]="row"></mat-row>
  </table>
  
  <button matButton="filled" (click)="updateInventory()">Update Inventory</button>
</div>
