<div class="page-body">
  
  <div>
    <button matButton="filled" (click)="addNewItem()">
      <mat-icon fontIcon="add"></mat-icon>
      Add new item
    </button>
  </div>

  <table mat-table [dataSource]="getShoppingBasket()" class="shopping-table mat-elevation-z8" cdkDropList (cdkDropListDropped)="drop($event)">

    
    <ng-container matColumnDef="dragger">
      <th mat-header-cell *matHeaderCellDef><th>
      <td mat-cell *matCellDef="let element">
        <mat-icon class="drag-cursor">reorder</mat-icon>
      <td>
    </ng-container>

    <ng-container matColumnDef="checked" sticky>
      <th mat-header-cell *matHeaderCellDef><th>
      <td mat-cell *matCellDef="let element">
        <mat-checkbox [checked]="element.checked" (change)="onItemChecked(element)"></mat-checkbox>
      <td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name<th>
      <td mat-cell *matCellDef="let element">{{element.name}} ({{element.category}})<td>
    </ng-container>

    <ng-container matColumnDef="quantityToBuy">
      <th mat-header-cell *matHeaderCellDef>How many?<th>
      <td mat-cell *matCellDef="let element">
        <mat-form-field subscriptSizing="dynamic">
          <input matInput type="number" min="1" [value]="element.quantityToBuy" (change)="onQuantityToBuyChanged($event.target.value, element)">
        </mat-form-field>
      <td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" cdkDrag [cdkDragData]="row"></tr>
  </table>
  
  <div>
    @let shoppingItems = shoppingService.shoppingListData$ | async;
    <button [disabled]="!shoppingItems || shoppingItems.every(item => !item.checked)" matButton="filled" (click)="updateInventory()">
      <mat-icon fontIcon="check"></mat-icon>
      Add Checked Items to Inventory
    </button>
  </div>
</div>
