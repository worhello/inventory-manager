<div class="page-body">

  <h2>Shopping List</h2>
  
  <button matButton="filled" (click)="addNewItem()">Add new item</button>

  <table mat-table [dataSource]="getShoppingBasket()" class="mat-elevation-z8">

    <ng-container matColumnDef="checked">
      <th mat-header-cell *matHeaderCellDef>Checked</th>
      <td mat-cell *matCellDef="let element">
        <mat-checkbox [checked]="element.checked" (change)="onItemChecked(element)"></mat-checkbox>
      </td>
    </ng-container>

    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let element"> {{element.category}} </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <ng-container matColumnDef="quantityToBuy">
      <th mat-header-cell *matHeaderCellDef>Quantity To Buy</th>
      <td mat-cell *matCellDef="let element">
        <mat-form-field>
          <mat-label>Quantity To Buy</mat-label>
          <input matInput type="number" min="1" [value]="element.quantityToBuy" (change)="onQuantityToBuyChanged($event.target.value, element)">
        </mat-form-field>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  
  <button matButton="filled" (click)="updateInventory()">Update Inventory</button>
</div>
