<mat-form-field>
  <mat-label>Item</mat-label>
  <input
    matInput
    #inventoryInput
    list="inventory-items"
    id="selected-inventory-item"
    name="selected-inventory-item"
    (change)="onInventoryItemSelected($event.target.value)"
  >
  <datalist id="inventory-items">
    @for (item of inventoryService.inventory$ | async; track $index) {
      <option value="{{ item.name }}"></option>
    }
  </datalist>
</mat-form-field>
