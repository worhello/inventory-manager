<mat-dialog-content>
  <h2>{{ title }}</h2>
  <div class="item-edit-container">
    <form [formGroup]="form" (ngSubmit)="save()">
      <mat-form-field>
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>
      <mat-form-field>
        <mat-label>Quantity</mat-label>
        <input matInput type="number" min="0" formControlName="quantity" />
      </mat-form-field>
      <mat-form-field>
        <mat-label>Minimum Quantity</mat-label>
        <input matInput type="number" min="0" formControlName="minQuantity" />
      </mat-form-field>
      <mat-form-field>
        <mat-label>Category</mat-label>
        <input
          matInput
          #categoryInput
          list="categories"
          id="selected-category"
          name="selected-category"
          formControlName="category"
          (change)="onCategorySelected()"
        />
        <datalist id="categories">
          @for (category of inventoryService.categories$ | async; track $index) {
            <option value="{{ category }}"></option>
          }
        </datalist>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Expiry Date (optional):</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="expiry" />
        <mat-hint>MM/DD/YYYY</mat-hint>
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
      <div class="button-container">
        <button matButton="filled" (click)="cancel()">Cancel</button>
        <button matButton="filled" type="submit" [disabled]="!form.valid">Save</button>
      </div>
    </form>
  </div>
</mat-dialog-content>
