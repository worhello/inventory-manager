<mat-dialog-content>
  <h2>{{title}}</h2>
  <div class="item-edit-container">
    <mat-form-field>
      <mat-label>Name</mat-label>
      <input matInput [(ngModel)]="item.name">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Quantity</mat-label>
      <input matInput type="text" [(ngModel)]="item.quantity">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Minimum Quantity</mat-label>
      <input matInput type="text" [(ngModel)]="item.minQuantity">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Category</mat-label>
      <input matInput type="text" [(ngModel)]="item.category">
    </mat-form-field>
    <mat-form-field>
      <mat-label>Expiry Date (optional):</mat-label>
      <input matInput [(ngModel)]="item.expiry" [matDatepicker]="picker">
      <mat-hint>MM/DD/YYYY</mat-hint>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    <div class="button-container">
      <button matButton="filled" (click)="cancel()">Cancel</button>
      <button matButton="filled" (click)="save()">Save</button>
    </div>
  </div>
</mat-dialog-content>
